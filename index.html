```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Controle do Baba</title>

<style>

body{
font-family:Arial;
background:#eef1f4;
margin:0;
}

.login{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}

input,select{
width:90%;
padding:10px;
margin:6px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:8px 12px;
background:#0a7a35;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
margin:2px;
}

.app{
display:none;
padding:20px;
max-width:900px;
margin:auto;
}

.cards{
display:flex;
gap:15px;
flex-wrap:wrap;
margin-bottom:20px;
}

.box{
background:white;
padding:15px;
border-radius:10px;
flex:1;
text-align:center;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:center;
}

th{
background:#0a7a35;
color:white;
}

.emdia{background:#d6ffd6;}
.amarelo{background:#fff3b0;}
.vermelho{background:#ffd6d6;}

</style>
</head>

<body>

<div class="login" id="login">

<div class="card">

<h2>⚽ Controle do Baba</h2>

<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

</div>

</div>

<div class="app" id="app">

<h2>⚽ Controle do Baba</h2>

<div class="cards">

<div class="box">
<h3>💰 Caixa</h3>
<p id="total">R$ 0</p>
</div>

<div class="box">
<h3>👥 Pagamentos</h3>
<p id="pagamentos">0</p>
</div>

<div class="box">
<h3>🔔 Devedores</h3>
<p id="devedores">0</p>
</div>

</div>

<h2>Adicionar Associado</h2>

<input id="nome" placeholder="Nome">
<input id="dataEntrada" type="date">

<select id="pagou">
<option value="nao">Não pagou</option>
<option value="sim">Já pagou</option>
</select>

<button onclick="add()">Adicionar</button>

<h2>Lista de Associados</h2>

<table>

<tr>
<th>Nome</th>
<th>Data que entrou</th>
<th>Último Pagamento</th>
<th>Total Pago</th>
<th>Status</th>
<th>Ações</th>
</tr>

<tbody id="lista"></tbody>

</table>

<h2>Registrar Convidado (R$5)</h2>

<input id="convidado" placeholder="Nome">
<button onclick="addConvidado()">Registrar</button>

<ul id="listaConvidados"></ul>

<h2>Registrar Despesa</h2>

<input id="descDespesa" placeholder="Ex: Bola nova">
<input id="valorDespesa" type="number" placeholder="Valor">

<button onclick="addDespesa()">Adicionar Despesa</button>

<ul id="listaDespesas"></ul>

</div>

<script>

let associados = JSON.parse(localStorage.getItem("associados")) || []
let convidados = JSON.parse(localStorage.getItem("convidados")) || []
let despesas = JSON.parse(localStorage.getItem("despesas")) || []

function login(){

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

if(u=="Gol" && p=="302022"){

document.getElementById("login").style.display="none"
document.getElementById("app").style.display="block"

atualizar()

}else{

alert("Login incorreto")

}

}

function salvar(){
localStorage.setItem("associados", JSON.stringify(associados))
}

function add(){

let nome=document.getElementById("nome").value
let dataEntrada=document.getElementById("dataEntrada").value
let pagou=document.getElementById("pagou").value

if(!nome || !dataEntrada) return alert("Preencha os campos")

let valor=0
let pagamento=null

if(pagou=="sim"){
valor=5
pagamento=new Date()
}

associados.push({
nome:nome,
dataEntrada:dataEntrada,
pagamento:pagamento,
valor:valor
})

document.getElementById("nome").value=""
document.getElementById("dataEntrada").value=""

salvar()
atualizar()

}

function pagar5(i){

associados[i].valor += 5
associados[i].pagamento = new Date()

salvar()
atualizar()

}

function pagarManual(i){

let valor = prompt("Digite o valor")

if(valor===null) return

associados[i].valor = parseFloat(valor)
associados[i].pagamento = new Date()

salvar()
atualizar()

}

function remover(i){

if(confirm("Remover associado?")){

associados.splice(i,1)

salvar()
atualizar()

}

}

function dias(data){

if(!data) return 999

let hoje=new Date()

return (hoje-new Date(data))/(1000*60*60*24)

}

function atualizar(){

mostrar()
mostrarConvidados()
mostrarDespesas()

}

function mostrar(){

let html=""
let total=0
let pagamentos=0
let devedores=0

for(let i=0;i<associados.length;i++){

let a=associados[i]

total += a.valor
if(a.valor>0) pagamentos++

let d=dias(a.pagamento)

let classe="emdia"
let status="Em dia"

if(d>60){
classe="vermelho"
status="🔴 2 meses devendo"
devedores++
}
else if(d>30){
classe="amarelo"
status="🟡 1 mês devendo"
devedores++
}

html+=`
<tr class="${classe}">
<td>${a.nome}</td>
<td>${a.dataEntrada}</td>
<td>${a.pagamento?new Date(a.pagamento).toLocaleDateString():"-"}</td>
<td>R$ ${a.valor}</td>
<td>${status}</td>
<td>
<button onclick="pagar5(${i})">+5</button>
<button onclick="pagarManual(${i})">Valor</button>
<button onclick="remover(${i})">❌</button>
</td>
</tr>
`

}

let totalDespesas=0

despesas.forEach(d=>{
totalDespesas += d.valor
})

let caixa = total - totalDespesas

document.getElementById("lista").innerHTML=html
document.getElementById("total").innerText="R$ "+caixa
document.getElementById("pagamentos").innerText=pagamentos
document.getElementById("devedores").innerText=devedores

}

function addConvidado(){

let nome=document.getElementById("convidado").value
if(!nome) return

convidados.push(nome)

document.getElementById("convidado").value=""

localStorage.setItem("convidados",JSON.stringify(convidados))

mostrarConvidados()

}

function mostrarConvidados(){

let html=""

convidados.forEach(c=>{
html+=`<li>${c} - R$5</li>`
})

document.getElementById("listaConvidados").innerHTML=html

}

function addDespesa(){

let desc=document.getElementById("descDespesa").value
let valor=parseFloat(document.getElementById("valorDespesa").value)

if(!desc || !valor) return alert("Preencha a despesa")

despesas.push({descricao:desc,valor:valor})

document.getElementById("descDespesa").value=""
document.getElementById("valorDespesa").value=""

localStorage.setItem("despesas",JSON.stringify(despesas))

mostrarDespesas()
mostrar()

}

function mostrarDespesas(){

let html=""

despesas.forEach(d=>{
html+=`<li>${d.descricao} - R$ ${d.valor}</li>`
})

document.getElementById("listaDespesas").innerHTML=html

}

</script>

</body>
</html>
